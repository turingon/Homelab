version: '3.8'

services:
  app:
    image: jc21/nginx-proxy-manager:2.10.4
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt

    labels:
      glance.name: Nginx Proxy Manager
      glance.url: https://panel.turingon.tech/
      glance.description: My Proxy Manager
      glance.id: npm

