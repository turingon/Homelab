services:
  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    ports:
      - "9001:9000"  # MinIO API Port
      - "9091:9090"  # MinIO Console Port
    environment:
      MINIO_ROOT_USER: "doruk"
      MINIO_ROOT_PASSWORD: "rommel07."
    volumes:
      - /root/minio:/data
    command: server --console-address ":9090" /data
    labels:
      glance.name: Minio 
      glance.url: https://obsidian.turingon.tech/login
      glance.description: Obsidian Syncthing Bucket
      glance.id: minio

