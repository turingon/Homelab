theme:
  background-color: 50 1 6
  primary-color: 157 47 65
  negative-color: 209 88 54

pages:
  - name: Home
    # - type: markets
    #     markets:
    #       - symbol: SPY
    #           name: S&P 500
    #        - symbol: BTC-USD
    #          name: Bitcoin
    #        - symbol: NVDA
    #          name: NVIDIA
    #        - symbol: AAPL
    #          name: Apple
    #        - symbol: MSFT
    #          name: Microsoft
    columns:
      - size: small
        widgets:
          - type: bookmarks
            groups:
              - title: Work
                links:
                  - title: Gmail
                    url: https://mail.google.com/mail/u/0/
                  - title: Github
                    url: https://github.com/
              - title: Problems
                color: 200 50 50
                links:
                  - title: Leetcode
                    url: https://leetcode.com/problemset/
                  - title: Codeforces
                    url: https://codeforces.com/
                  - title: Hackerrank
                    url: https://www.hackerrank.com/dashboard
          $include: leetcode.yml
          - type: twitch-channels
            channels:
              - theprimeagen
              - piratesoftware
              - cohhcarnage
              - christitustech

      - size: full
        widgets:
          - type: group
            widgets:
              - type: rss
                style: horizontal-cards
                feeds:
                  - url: https://selfh.st/rss/
                    title: selfh.st
                  - url: https://www.joshwcomeau.com/rss.xml
                    title: Josh Comeau
                  - url: https://rss.arxiv.org/rss/cs
                    title: Arxiv
                    limit: 3
                  - url: https://www.quantamagazine.org/feed/
                    title: Quantamagazine
                  - url: https://dev.to/feed
                    title: DEV Community
                    limit: 3
                  - url: https://www.pontikis.net/feed
                    title: Pontikis.net
              - type: hacker-news
              - type: lobsters

          - type: videos
            channels:
              - UCh7dyZMOHspOSnDYTNfyMSA # Tech Tutoriols with Piyush
              - UCXuqSBlHAE6Xw-yeJA0Tunw # Linus Tech Tips
              - UCR-DXc1voovS8nhAvccRZhg # Jeff Geerling
              - UCsBjURrPoezykLs9EqgamOA # Fireship
              - UCHnyfMqiRRG1u-2MsSQLbXA # Veritasium
              - UCUyeluBRhGPCW4rPe_UvBZQ # ThePrimeTime
              - UCYeiozh-4QwuC1sjgCmB92w # DevOps Toolbox
              - UC8butISFwT-Wl7EV0hUK0BQ # FreeCodeCamp
              - UCokuhoh5N_B0ZxHcEU_EWbQ # Math with Professor V

          - type: group
            widgets:
              - type: reddit
                style: horizontal-cards
                title: UnixPorn
                subreddit: unixporn
                show-thumbnails: true
                show-flairs: true
                app-auth:
                  name: glance
                  id: JZfZpn7DjHBl_ZcDMmkFXw
                  secret: gW34B6XjgPLZ93dCqMc-IXrK_ojQfg

      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday

          - type: weather
            location: Istanbul,Türkiye
            units: metric
            hour-format: 24h 
         

  - name: Host
    columns:
      - size: small
        widgets:
          - type: server-stats
            servers:
              - type: local
                name: My Server Stats
          - type: repository
            repository: kubernetes/kubernetes
            pull-requests-limit: 10
            issues-limit: 5
            commits-limit: 5
      - size: full
        widgets:
          - type: docker-containers

      - size: small
        widgets:
          - type: clock
            timezones:
              - timezone: Europe/London
                label:  London 
              - timezone: America/Los_Angeles
                label: Los Angeles 
              - timezone: Asia/Tokyo
                label: Tokyo

  
